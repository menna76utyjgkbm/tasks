<!DOCTYPE html>
<html>

<head>
    <title>Super Mario</title>

    <style>

        body {
            font-family: Arial;
            background-color: beige;
            margin: 20px;
        }

        h1 {
            color: red;
        }

        .menu a {
            margin-right: 10px;
            color: blue;
        }

        .box {
            background-color: white;
            padding: 10px;
            margin-top: 10px;
        }

        .btn {
            background-color: orange;
            color: black;
            padding: 8px;
            text-decoration: none;
        }

    </style>

</head>

<body>

    <!-- Navigation -->
    <div class="menu">
        <a href="#story">Story</a>
        <a href="#characters">Characters</a>
        <a href="#review">Review</a>
    </div>

    <!-- Title -->
    <h1>Super Mario</h1>

    <!-- Story Section -->
    <div class="box">
        <h2 id="story">Story</h2>

        <p>
            Mario goes on adventures to save Princess Peach
            from Bowser.
        </p>
    </div>

    <!-- Characters Section -->
    <div class="box">
        <h2 id="characters">Characters</h2>

        <p>
            Main characters include Mario, Luigi,
            Princess Peach, and Bowser.
        </p>
    </div>

    <!-- Review Section -->
    <div class="box">
        <h2 id="review">Review</h2>

        <p>
            Super Mario is one of the most famous
            and fun games ever created.
        </p>
    </div>

    <!-- Button Link -->
    <br>

    <a class="btn" href="https://mario.nintendo.com/" target="_blank">
        Official Website
    </a>

</body>

</html>
