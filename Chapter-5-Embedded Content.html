<!DOCTYPE html>
<html>

<head>
    <title>Embed Video</title>

    <style>

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
            background-color: #000;
        }

        video {
            width: 600px;
            max-width: 90%;
        }

    </style>

</head>

<body>

    <!-- Video element (locally hosted) -->
    <video controls loop poster="poster.jpg">
        <source src="video.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

</body>

</html>
